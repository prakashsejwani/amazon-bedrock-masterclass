name: Next.js CI

on:
  push:
    branches: [ main ]
    paths:
      - 'code/nextjs/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'code/nextjs/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: code/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: code/nextjs

      - name: Compile and Build Next.js Application
        run: npm run build
        working-directory: code/nextjs
