name: Docs CI

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'lessons/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'lessons/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build Nextra Site
        run: npm run build
        working-directory: docs
