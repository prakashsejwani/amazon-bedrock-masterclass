name: Release Tagging CI

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Next Version
        id: next_version
        run: |
          # Simple conventional commit tag incrementer (v0.x)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Parse version numbers
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          
          # Increment minor version on features, otherwise keep it or check commit message
          NEW_MINOR=$((MINOR + 1))
          NEW_TAG="v$MAJOR.$NEW_MINOR"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next tag: $NEW_TAG"

      - name: Create Git Tag
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git tag ${{ steps.next_version.outputs.new_tag }}
          git push origin ${{ steps.next_version.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
