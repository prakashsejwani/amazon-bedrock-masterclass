name: Link Checking CI

on:
  push:
    branches: [ main ]
    paths:
      - 'lessons/**/*.md'
      - 'README.md'
  pull_request:
    branches: [ main ]
    paths:
      - 'lessons/**/*.md'
      - 'README.md'
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress "lessons/**/*.md" "README.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
